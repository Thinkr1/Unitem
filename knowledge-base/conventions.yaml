# Convention Knowledge Base — Design Diplomat
# The classifier matches atomic changes against these rules.
# See docs/06-convention-knowledge-base.md

rules:
  - id: propagate/brand-color
    verdict: propagate
    applies_to: [color]
    when: "the changed value is a brand or semantic color token (primary, accent, error, success, warning)"
    why: "Brand and semantic colors express identity and meaning; they must be identical across platforms."
    examples:
      - "primary #2563EB -> #1D4ED8 on iOS should apply to Android"

  - id: propagate/spacing-scale
    verdict: propagate
    applies_to: [spacing]
    when: "base grid unit or spacing scale token changes"
    why: "Spacing scale is shared brand geometry; both platforms follow the same scale."
    examples:
      - "spacing.md 16 -> 20 on either platform"

  - id: propagate/copy
    verdict: propagate
    applies_to: [copy]
    when: "user-visible label or copy text changes"
    why: "Product copy should match across platforms unless localized."
    examples:
      - "Settings title 'Account' -> 'Profile'"

  - id: hold/native-switch
    verdict: hold
    applies_to: [component]
    when: "a toggle/switch is changed to the platform-native control style"
    why: "iOS uses UISwitch; Android uses Material Switch. Each platform keeps its native control."
    examples:
      - "iOS switch restyled to native UISwitch -> Android keeps Material Switch"

  - id: hold/navigation
    verdict: hold
    applies_to: [component]
    when: "navigation pattern follows platform HIG (back swipe, chevron, top app bar)"
    why: "Navigation idioms differ by platform and should stay native."
    examples:
      - "iOS large title navigation vs Android top app bar"

  - id: hold/system-font
    verdict: hold
    applies_to: [typography]
    when: "system UI font (SF Pro vs Roboto) is used or adjusted"
    why: "System fonts are platform idioms. Brand font changes are propagate, not hold."
    examples:
      - "Body text uses platform default font"

  - id: hold/touch-target
    verdict: hold
    applies_to: [spacing]
    when: "touch target size follows platform minimum (44pt iOS vs 48dp Android)"
    why: "Platform accessibility minimums differ; correct divergence, not drift."
    examples:
      - "Button height 44pt on iOS vs 48dp on Android"

  - id: flag/hardcoded-color
    verdict: flag
    applies_to: [color]
    when: "a raw hex value is used instead of a defined token, OR one platform still uses the old value after brand update elsewhere"
    why: "Hardcoded values and stale values are drift; they break single source of truth."
    examples:
      - "Android still Color(0xFF2563EB) after brand updated to #1D4ED8"

  - id: flag/off-scale-spacing
    verdict: flag
    applies_to: [spacing]
    when: "spacing or size is not on the defined scale (e.g. 7px when scale is multiples of 8)"
    why: "Off-scale values indicate accidental drift from the design system."
    examples:
      - "padding 7dp when grid unit is 8"

  - id: flag/contrast-failure
    verdict: flag
    applies_to: [color]
    when: "text/background contrast ratio falls below WCAG AA (4.5:1 normal text)"
    why: "Accessibility regression must be fixed."
    examples:
      - "Light gray text on white after color tweak"
